buildscript {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
    }
}

apply plugin: 'org.jetbrains.kotlin.jvm'
apply plugin: 'application'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

sourceSets {
    main {
        kotlin {
            srcDirs = [
                'src/main/kotlin',
                '../../../apps/android/app/src/native/java/com/yiqiu/shirohaquiz/importer/model',
                '../../../apps/android/app/src/native/java/com/yiqiu/shirohaquiz/importer/parser',
                '../../../apps/android/app/src/native/java/com/yiqiu/shirohaquiz/importer/score',
                '../../../apps/android/app/src/native/java/com/yiqiu/shirohaquiz/importer/validate'
            ]
        }
    }
}

application {
    mainClass = 'RegressionRunnerKt'
}

